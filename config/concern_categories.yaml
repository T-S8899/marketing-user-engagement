# This is the only valid source for concern categories.
# Do not duplicate these values in code or other config files.

categories:
  - id: "poor_slow_customer_service"
    label: "Poor or Slow Customer Service"
    label_ar: "خدمة عملاء ضعيفة أو بطيئة"
    description: "Complaints about support quality, slow replies, unavailable agents, or unresolved service requests."
    dashboard_priority: 1
    dashboard_group: "service"
    recommended_action: "Tighten response messaging, publish support expectations, and route repeated service signals for follow-up."
    escalation_team: "Customer Experience"
    keywords:
      - "customer service"
      - "support"
      - "slow response"
      - "no response"
      - "agent"
      - "call center"
      - "خدمة العملاء"
      - "الدعم"
      - "رد بطيء"
      - "ما يردون"
  - id: "delay_cancellation_booking_delivery"
    label: "Delay or Cancellation of Bookings/Delivery"
    label_ar: "تأخير أو إلغاء الحجوزات أو التسليم"
    description: "Complaints about booking delays, delivery delays, cancellations, missed appointments, or schedule problems."
    dashboard_priority: 2
    recommended_action: "Clarify booking and delivery timing in campaigns, and prepare proactive delay-response templates."
    escalation_team: "Operations"
    keywords:
      - "delay"
      - "late"
      - "canceled"
      - "cancelled"
      - "booking"
      - "delivery"
      - "reservation"
      - "تأخير"
      - "متأخر"
      - "إلغاء"
      - "الحجز"
      - "التسليم"
  - id: "credibility_unprofessionalism"
    label: "Lack of Credibility & Unprofessionalism"
    label_ar: "ضعف المصداقية وعدم الاحترافية"
    description: "Complaints about credibility, professionalism, misleading claims, trust gaps, or poor conduct."
    dashboard_priority: 3
    dashboard_group: "credibility"
    trust_risk: true
    recommended_action: "Review claim language, reinforce proof points, and avoid messaging that can be read as overpromising."
    escalation_team: "Brand Trust"
    keywords:
      - "unprofessional"
      - "misleading"
      - "trust"
      - "credibility"
      - "fake"
      - "promise"
      - "غير احترافي"
      - "مصداقية"
      - "ثقة"
      - "وعد"
      - "تضليل"
  - id: "refund_insurance_fee_issues"
    label: "Refund/Insurance/Fee Issues"
    label_ar: "مشاكل الاسترداد أو التأمين أو الرسوم"
    description: "Complaints about refunds, deposits, insurance, hidden fees, extra charges, or payment disputes."
    dashboard_priority: 4
    dashboard_group: "refund"
    recommended_action: "Make fees, insurance, and refund expectations clearer before conversion and in response templates."
    escalation_team: "Finance Operations"
    keywords:
      - "refund"
      - "insurance"
      - "fee"
      - "charge"
      - "deposit"
      - "payment"
      - "استرداد"
      - "تأمين"
      - "رسوم"
      - "مبلغ"
      - "دفع"
  - id: "car_condition"
    label: "Car Condition"
    label_ar: "حالة السيارة"
    description: "Complaints about vehicle cleanliness, maintenance, damage, mechanical issues, or poor car quality."
    dashboard_priority: 5
    dashboard_group: "condition"
    recommended_action: "Use condition-related signals to adjust expectation-setting and route repeated quality issues for review."
    escalation_team: "Fleet Quality"
    keywords:
      - "car condition"
      - "dirty"
      - "clean"
      - "damage"
      - "maintenance"
      - "smell"
      - "حالة السيارة"
      - "وسخ"
      - "نظافة"
      - "عطل"
      - "صيانة"
